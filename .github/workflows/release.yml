name: test and publish

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Run tests
        run: uv run --with-editable . --extra test pytest -q
      - name: Build package
        run: uv build

  prerelease:
    name: Publish prerelease to TestPyPI
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'Automatically generated by python-semantic-release')
    environment: pre-release
    permissions:
      contents: write
      id-token: write
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git pull --ff-only origin main
          uv run --group release semantic-release version --as-prerelease
          git push origin main --follow-tags
          uv run --group release semantic-release publish
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          verbose: true

  release:
    name: Publish release to PyPI
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch'
    environment: release
    permissions:
      contents: write
      id-token: write
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Require prerelease version
        run: |
          VERSION=$(uv version --short)
          case "$VERSION" in
            *rc*|*alpha*|*beta*) ;;
            *)
              echo "Current version ($VERSION) is not a prerelease. Push to main first."
              exit 1
              ;;
          esac
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          uv run --group release semantic-release version
          git push origin main --follow-tags
          uv run --group release semantic-release publish
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          skip-existing: true
          verbose: true
